<!doctype html>
<html lang="en" class="page-fixed">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Football Guessr</title>
        <link
            rel="icon"
            href="<%= htmlWebpackPlugin.options.basePath %>/favicon.svg"
        />
    </head>

    <body>
        <div id="header"></div>
        <main>
            <section class="game" aria-labelledby="mode">
                <p id="mode" class="game__mode"></p>
                <ul id="clubs" class="game__clubs"></ul>
                <form id="guess-form" class="game__form">
                    <div class="game__input-wrap">
                        <input
                            id="guess-input"
                            name="guess"
                            type="text"
                            autocomplete="off"
                            placeholder="Guess the footballer…"
                            aria-label="Guess the footballer"
                            role="combobox"
                            aria-autocomplete="list"
                            aria-expanded="false"
                            aria-controls="autocomplete-box"
                        />
                        <div
                            id="autocomplete-box"
                            class="autocomplete"
                            role="listbox"
                            hidden
                        ></div>
                    </div>
                    <button type="submit">Guess</button>
                </form>
                <p class="game__guesses">
                    Guesses left: <span id="guesses-left"></span>
                </p>
                <p
                    id="status"
                    class="game__status"
                    role="status"
                    aria-live="polite"
                ></p>
                <button
                    id="play-again"
                    class="game__play-again"
                    type="button"
                    hidden
                >
                    Play Again
                </button>
                <a
                    id="go-practice"
                    class="game__go-practice"
                    href="<%= htmlWebpackPlugin.options.basePath %>practice"
                    hidden
                >
                    Play Practice Mode
                </a>
            </section>
        </main>
        <div
            id="modal-overlay"
            class="modal-overlay"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-title"
            aria-describedby="modal-message"
        >
            <div id="modal" class="modal">
                <div
                    id="modal-icon"
                    class="modal__icon"
                    aria-hidden="true"
                ></div>
                <h2 id="modal-title" class="modal__title"></h2>
                <p id="modal-message" class="modal__message"></p>
                <p id="modal-stats" class="modal__stats"></p>
                <div class="modal__actions">
                    <button
                        id="modal-play-again-btn"
                        class="modal__play-again-btn"
                        type="button"
                        hidden
                    >
                        Play Again
                    </button>
                    <a
                        id="modal-practice-btn"
                        class="modal__practice-btn"
                        href="<%= htmlWebpackPlugin.options.basePath %>practice"
                        hidden
                    >
                        Play Practice Mode
                    </a>
                    <button
                        id="modal-close-btn"
                        class="modal__close-btn"
                        type="button"
                    >
                        OK
                    </button>
                </div>
            </div>
        </div>
        <div id="footer"></div>
    </body>
</html>
